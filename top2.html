<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>给最爱的你 ❤️</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            overflow: hidden;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        .container {
            position: relative;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .photo-frame {
            border: 15px solid white;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
            overflow: hidden;
            transform: rotate(-3deg);
            animation: float 3s ease-in-out infinite;
        }

        .photo-frame img {
            width: 150px;
            height: 200px;
            object-fit: cover;
        }

        .message {
            text-align: center;
            color: white;
            margin-top: 30px;
            opacity: 0;
            animation: fadeIn 2s forwards;
            animation-delay: 1s;
        }

        h1 {
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2em;
            line-height: 1.6;
            margin: 10px 0;
        }

        .hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            color: #ff69b4;
            animation: fall 8s linear infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-20px) rotate(3deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fall {
            from {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 1;
            }
            to {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- 背景音乐（需要替换音乐文件链接） -->
    
    <audio src="M800004Ei9Yn28R17E.mp3"></audio>

    <!-- 飘落的心 -->
    <div class="hearts" id="hearts"></div>

    <div class="container">
        <!-- 照片框 -->
        <div class="photo-frame">
            <img src="2.png" alt="最爱的你">
            <img src="1.png" alt="00">
        </div>

        <!-- 文字内容 -->
        <div class="message">
            <h1>生日快乐，我的女孩！🎂</h1>
            <p>在星辰大海中，你是最亮的那颗星 ✨</p>
            <p>时光会走远，但爱意永存 ❤️</p>
            <p>愿今后的每一天，都有我陪你走过 🌈</p>
            <p>—— 永远爱你的 杨宛玲</p>
        </div>
    </div>

    <script>
        // 生成飘落的心
        function createHearts() {
            const heartsContainer = document.getElementById('hearts');
            for (let i = 0; i < 30; i++) {
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.className = 'heart';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 5 + 's';
                heartsContainer.appendChild(heart);
            }
        }
        createHearts();
    </script>
</body>
</html>
