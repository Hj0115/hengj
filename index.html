<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>恒久制作</title>
    <style>
        body {
            background: linear-gradient(45deg, #ff9a9e, #fad0c4);
            font-family: 'Microsoft Yahei', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .login-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            z-index: 9999;
        }
        .login-box h2 {
            color: #ff5e8f;
            margin-bottom: 20px;
        }
        input {
            width: 240px;
            height: 40px;
            margin: 10px 0;
            padding: 0 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            width: 240px;
            height: 44px;
            background: #ff5e8f;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #ff3c72;
        }
        #content {
            display: none;
            padding: 20px;
        }
        .slideshow {
            width: 600px;
            height: 400px;
            margin: 30px auto;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
        }
        .slideshow img {
            width: 100%;
            height: 100%;
            position: absolute;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1s;
        }
        .message {
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            font-size: 18px;
            line-height: 1.8;
        }
        .heart {
            color: #ff4081;
            font-size: 40px;
            animation: beat 1s infinite;
        }
        @keyframes beat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .typing {
            border-right: 2px solid white;
            white-space: nowrap;
            overflow: hidden;
            width: 280px;
            margin: 10px auto;
            animation: typing 3s steps(40) infinite;
        }
        @keyframes typing {
            from { width: 0; }
            to { width: 280px; }
        }
    </style>
</head>

<body>

<div class="login-box" id="login">
    <h2>请登录</h2>
    <input type="text" id="user" placeholder="账号"><br>
    <input type="password" id="pwd" placeholder="密码"><br>
    <button onclick="login()">登录</button>
</div>

<div id="content">
    <div class="slideshow">
        <img src="1.jpg">
        <img src="2.jpg">
        <img src="3.jpg">
        <img src="4.jpg">
        <img src="5.jpg">
        <img src="6.jpg">
        <img src="7.jpg">
    </div>

    <div class="message">
        <h1><span class="heart">❤</span> 生日快乐！<span class="heart">❤</span></h1>
        <p>亲爱的 杨宛玲宝宝：</p>
        <p>在这个特别的日子里，我想告诉你</p>
        <p>你是我生命中最美好的遇见</p>
        <p>时光会走远，但爱意永存 ❤️</p>
        <p>愿今后的每一天，都有我陪你走过 🌈</p>
        <p class="typing">---永远爱你的我 ❤️</p>
    </div>
    <img src="10.jpg" style="max-width:300px;">
</div>

<audio loop id="music">
    <source src="your-music.mp3">


<script>
function login(){
    let u = document.getElementById('user').value;
    let p = document.getElementById('pwd').value;

    let a = String.fromCharCode(97,100,109,105,110);
    let b = String.fromCharCode(72,106,48,51,49,48,50,54,46);

    if(u === a && p === b){
        document.getElementById('login').style.display='none';
        document.getElementById('content').style.display='block';
        document.getElementById('music').play();
    }else{
        alert('账号或密码错误');
    }
}

let current = 0;
const imgs = document.querySelectorAll(".slideshow img");
imgs[0].style.opacity = 1;
setInterval(()=>{
    imgs[current].style.opacity=0;
    current=(current+1)%imgs.length;
    imgs[current].style.opacity=1;
},3000);
</script>

</body>
</html>
